<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .profile-img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 15px;
      border: 2px solid #4facfe;
    }

    .upload-btn {
      font-size: 12px;
      color: #4facfe;
      cursor: pointer;
    }

    .upload-btn input {
      display: none;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #4facfe;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3a8de0;
    }

    /* 📱 Mobile */
    @media (max-width: 480px) {
      .card {
        margin: 20px;
        padding: 20px;
      }

      .profile-img {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="profile-header">
      <img id="preview" src="https://via.placeholder.com/100" class="profile-img">

      <label class="upload-btn">
        Change Photo
        <input type="file" accept="image/*" onchange="previewImage(event)">
      </label>
    </div>

    <form>
      <div class="form-group">
        <label>Nama</label>
        <input type="text" placeholder="Masukkan nama">
      </div>

      <div class="form-group">
        <label>No Telepon</label>
        <input type="text" placeholder="Masukkan nomor telepon">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Masukkan email">
      </div>

      <button type="submit" class="btn">Save Profile</button>
    </form>

  </div>

  <script>
    function previewImage(event) {
      const reader = new FileReader();
      reader.onload = function(){
        const output = document.getElementById('preview');
        output.src = reader.result;
      };
      reader.readAsDataURL(event.target.files[0]);
    }
  </script>

</body>
</html>
